submission_notes: >
  Multi-signal ranking engine: semantic similarity (40%) + role-fit scoring
  (20%) + proficiency-weighted skill match (15%) + behavioral signals (15%)
  + career trajectory (10%). Pre-computation builds a FAISS flat-IP index
  over 100K candidate embeddings. Ranking step loads the index, ANN-retrieves
  top-500, scores each with pure-CPU math, detects honeypots via profile
  consistency checks, and outputs exactly 100 rows in < 5 minutes.
  No LLM calls during the ranking step.
